<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>District Badminton – Court Booking</title>
  <style>
    /* ── Custom Properties ───────────────────────────────────── */
    :root {
      --bg:          #0f172a;
      --surface:     #1e293b;
      --surface-2:   #334155;
      --surface-3:   #475569;
      --accent:      #22d3ee;
      --accent-dim:  #0891b2;
      --accent-soft: rgba(34,211,238,.12);
      --success:     #4ade80;
      --success-bg:  rgba(74,222,128,.15);
      --danger:      #f43f5e;
      --danger-soft: rgba(244,63,94,.12);
      --text:        #f1f5f9;
      --text-muted:  #94a3b8;
      --text-dim:    #64748b;
      --radius:      12px;
      --radius-sm:   8px;
      --shadow:      0 4px 24px rgba(0,0,0,.4);
    }

    /* ── Reset / Base ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }
    button { cursor: pointer; font-family: inherit; }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    input  { font-family: inherit; }
    input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── Confirmation Banner ─────────────────────────────────── */
    #banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 300;
      background: var(--success-bg);
      border-bottom: 1px solid var(--success);
      color: var(--success);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 24px;
      font-size: .9rem;
      font-weight: 500;
      transform: translateY(-110%);
      transition: transform .3s ease;
    }
    #banner.visible { transform: translateY(0); }
    #banner-msg { flex: 1; }
    #banner-close {
      background: none;
      border: none;
      color: var(--success);
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      opacity: .7;
    }
    #banner-close:hover { opacity: 1; }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      padding: 40px 24px 20px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-icon { font-size: 2rem; line-height: 1; }
    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -.02em;
    }
    header h1 span { color: var(--accent); }
    .header-meta {
      color: var(--text-muted);
      font-size: .875rem;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .header-meta strong { color: var(--text); }

    /* ── User Menu ───────────────────────────────────────────── */
    #user-area {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #user-greeting {
      font-size: .85rem;
      color: var(--text-muted);
    }
    #user-greeting strong { color: var(--text); }
    .btn-auth {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: .85rem;
      font-weight: 600;
      border: 1px solid transparent;
      transition: all .15s;
    }
    .btn-auth--primary {
      background: var(--accent);
      color: #0f172a;
    }
    .btn-auth--primary:hover { background: #67e8f9; }
    .btn-auth--ghost {
      background: transparent;
      border-color: var(--surface-2);
      color: var(--text-muted);
    }
    .btn-auth--ghost:hover {
      border-color: var(--surface-3);
      color: var(--text);
    }

    /* ── Date Strip ──────────────────────────────────────────── */
    #date-strip-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 28px;
    }
    .strip-label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    #date-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
      scrollbar-width: thin;
      scrollbar-color: var(--surface-2) transparent;
    }
    #date-strip::-webkit-scrollbar        { height: 4px; }
    #date-strip::-webkit-scrollbar-track  { background: transparent; }
    #date-strip::-webkit-scrollbar-thumb  { background: var(--surface-2); border-radius: 2px; }
    .date-btn {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: var(--surface);
      border: 1px solid var(--surface-2);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      min-width: 68px;
      transition: border-color .15s, background .15s, transform .15s;
    }
    .date-btn:hover:not(.date-btn--selected) {
      border-color: var(--surface-3);
      background: var(--surface-2);
      transform: translateY(-1px);
    }
    .date-btn__day {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .date-btn__num {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }
    .date-btn__month { font-size: .65rem; color: var(--text-muted); }
    .date-btn--today .date-btn__day::before {
      content: "● ";
      color: var(--accent);
      font-size: .5rem;
      vertical-align: middle;
    }
    .date-btn--selected {
      background: var(--accent);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(34,211,238,.3);
    }
    .date-btn--selected .date-btn__day,
    .date-btn--selected .date-btn__num,
    .date-btn--selected .date-btn__month { color: #0f172a; }
    .date-btn--selected .date-btn__day::before { color: #0f172a; }

    /* ── Main / Courts Grid ──────────────────────────────────── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 16px;
    }
    .section-label {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .section-date-badge { font-size: .75rem; color: var(--accent); font-weight: 500; }
    #courts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    /* ── Court Card ──────────────────────────────────────────── */
    .court-card {
      background: var(--surface);
      border: 1px solid var(--surface-2);
      border-radius: var(--radius);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .court-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
      border-color: var(--surface-3);
    }
    .card-header { display: flex; align-items: flex-start; gap: 12px; }
    .card-emoji { font-size: 1.6rem; line-height: 1; flex-shrink: 0; margin-top: 2px; }
    .card-title { flex: 1; }
    .card-title h2 { font-size: 1rem; font-weight: 600; line-height: 1.3; }
    .card-location {
      font-size: .8rem; color: var(--text-muted); margin-top: 3px;
      display: flex; align-items: flex-start; gap: 4px;
    }
    .card-location::before { content: "📍"; font-size: .75rem; flex-shrink: 0; }
    .card-stats { display: flex; gap: 10px; flex-wrap: wrap; }
    .stat-pill {
      font-size: .75rem; padding: 3px 10px;
      border-radius: 20px; font-weight: 500;
    }
    .stat-pill.available { background: var(--accent-soft); color: var(--accent); }
    .stat-pill.booked    { background: rgba(148,163,184,.1); color: var(--text-muted); }
    .btn-view {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--surface-3);
      color: var(--text);
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: .875rem; font-weight: 500;
      transition: background .15s, border-color .15s, color .15s;
    }
    .btn-view:hover {
      background: var(--accent); border-color: var(--accent); color: #0f172a;
    }

    /* ── Booking Modal ───────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
      padding: 20px;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: var(--surface);
      border: 1px solid var(--surface-2);
      border-radius: var(--radius);
      width: 100%; max-width: 480px; max-height: 90vh;
      overflow-y: auto; box-shadow: var(--shadow);
      animation: modalIn .2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1)  translateY(0);    }
    }
    .modal-header {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      padding: 20px 20px 0; gap: 12px;
    }
    .modal-title-group { flex: 1; }
    .modal-title-group h3 { font-size: 1.05rem; font-weight: 600; }
    .modal-subtitle { font-size: .8rem; color: var(--text-muted); margin-top: 2px; }
    .modal-date-line {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 6px; font-size: .78rem; font-weight: 600;
      color: var(--accent); background: var(--accent-soft);
      padding: 3px 10px; border-radius: 20px;
    }
    .btn-close {
      background: var(--surface-2); border: none;
      color: var(--text-muted); width: 32px; height: 32px;
      border-radius: 50%; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s, color .15s;
    }
    .btn-close:hover { background: var(--surface-3); color: var(--text); }
    .modal-body { padding: 20px; }
    .period-group { margin-bottom: 20px; }
    .period-group:last-child { margin-bottom: 0; }
    .period-label {
      font-size: .7rem; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px;
    }
    .slots-row { display: flex; flex-wrap: wrap; gap: 8px; }

    /* ── Slot Buttons ────────────────────────────────────────── */
    .slot-btn {
      background: transparent;
      border: 1px solid var(--surface-3);
      color: var(--text-muted);
      padding: 7px 14px; border-radius: 20px;
      font-size: .8rem; font-weight: 500;
      transition: all .15s ease; white-space: nowrap;
    }
    .slot-btn:hover:not(.slot-btn--mine):not(.slot-btn--taken) {
      border-color: var(--accent); color: var(--accent);
      background: var(--accent-soft);
    }
    /* Booked by current user */
    .slot-btn--mine {
      background: var(--accent-dim); border-color: var(--accent-dim);
      color: #0f172a; font-weight: 600;
    }
    .slot-btn--mine:hover {
      background: var(--danger); border-color: var(--danger); color: #fff;
    }
    .slot-btn--mine .slot-badge { font-size: .65rem; opacity: .85; margin-left: 4px; }
    /* Booked by someone else */
    .slot-btn--taken {
      background: rgba(148,163,184,.07);
      border-color: var(--surface-2);
      color: var(--text-dim);
      cursor: not-allowed; opacity: .6;
    }
    .modal-sign-in-note {
      margin-bottom: 16px;
      padding: 10px 14px;
      background: var(--accent-soft);
      border: 1px solid rgba(34,211,238,.2);
      border-radius: var(--radius-sm);
      font-size: .8rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .modal-sign-in-note button {
      background: none; border: none;
      color: var(--accent); font-size: .8rem;
      font-weight: 700; text-decoration: underline;
      padding: 0; cursor: pointer;
    }
    .modal-hint {
      margin-top: 18px; padding: 10px 14px;
      background: rgba(148,163,184,.07);
      border-radius: var(--radius-sm);
      font-size: .75rem; color: var(--text-dim);
    }

    /* ── Auth Modal ──────────────────────────────────────────── */
    #auth-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
      padding: 20px;
    }
    #auth-overlay.open { display: flex; }
    #auth-modal {
      background: var(--surface);
      border: 1px solid var(--surface-2);
      border-radius: var(--radius);
      width: 100%; max-width: 400px;
      box-shadow: var(--shadow);
      animation: modalIn .2s ease;
      overflow: hidden;
    }
    .auth-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 20px 0;
    }
    .auth-top h2 { font-size: 1.1rem; font-weight: 700; }
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--surface-2);
      margin-top: 16px;
    }
    .auth-tab {
      flex: 1;
      background: none; border: none;
      padding: 12px;
      font-size: .85rem; font-weight: 600;
      color: var(--text-dim);
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .auth-tab:hover { color: var(--text); }
    .auth-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .auth-form {
      display: none;
      flex-direction: column;
      gap: 14px;
      padding: 20px;
    }
    .auth-form.active { display: flex; }
    .auth-form label {
      display: flex; flex-direction: column; gap: 6px;
      font-size: .82rem; color: var(--text-muted);
    }
    .auth-form input {
      background: var(--bg);
      border: 1px solid var(--surface-2);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 12px;
      font-size: .9rem;
      transition: border-color .15s;
    }
    .auth-form input:focus { outline: none; border-color: var(--accent); }
    .auth-form input::placeholder { color: var(--text-dim); }
    .auth-error {
      font-size: .8rem;
      color: var(--danger);
      background: var(--danger-soft);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      display: none;
    }
    .auth-error.visible { display: block; }
    .btn-submit {
      background: var(--accent);
      border: none; border-radius: var(--radius-sm);
      color: #0f172a; font-weight: 700;
      padding: 11px; font-size: .9rem;
      transition: background .15s, opacity .15s;
    }
    .btn-submit:hover { background: #67e8f9; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- Confirmation Banner -->
  <div id="banner" role="status" aria-live="polite">
    <span id="banner-msg"></span>
    <button id="banner-close" data-action="close-banner" aria-label="Dismiss">✕</button>
  </div>

  <!-- Header -->
  <header>
    <div class="header-row">
      <div class="header-top">
        <span class="header-icon">🏸</span>
        <h1>District <span>Badminton</span></h1>
      </div>
      <div id="user-area">
        <!-- Populated by renderUserArea() -->
      </div>
    </div>
    <div class="header-meta">
      <span>Book courts at your local sports centers</span>
      <span>Today: <strong id="today-date"></strong></span>
    </div>
  </header>

  <!-- Date Strip -->
  <div id="date-strip-wrapper">
    <p class="strip-label">Select a date</p>
    <div id="date-strip" role="group" aria-label="Date selector"></div>
  </div>

  <!-- Courts Grid -->
  <main>
    <div class="section-header">
      <p class="section-label">Available Courts</p>
      <span class="section-date-badge" id="section-date-badge"></span>
    </div>
    <div id="courts-grid"></div>
  </main>

  <!-- Booking Modal -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-court-name">
    <div id="modal">
      <div class="modal-header">
        <div class="modal-title-group">
          <h3 id="modal-court-name"></h3>
          <p class="modal-subtitle" id="modal-court-loc"></p>
          <p class="modal-date-line" id="modal-date-line"></p>
        </div>
        <button class="btn-close" data-action="close-modal" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div id="auth-overlay" role="dialog" aria-modal="true" aria-labelledby="auth-heading">
    <div id="auth-modal">
      <div class="auth-top">
        <h2 id="auth-heading">Welcome</h2>
        <button class="btn-close" data-action="close-auth" aria-label="Close">✕</button>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab"        data-tab="register">Create Account</button>
      </div>

      <!-- Sign-in form -->
      <form class="auth-form active" id="login-form" novalidate>
        <label>
          Email
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required />
        </label>
        <label>
          Password
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
        </label>
        <p class="auth-error" id="login-error"></p>
        <button type="submit" class="btn-submit" id="login-submit">Sign In</button>
      </form>

      <!-- Register form -->
      <form class="auth-form" id="register-form" novalidate>
        <label>
          Your name
          <input type="text" id="reg-name" placeholder="Alex Johnson" autocomplete="name" required />
        </label>
        <label>
          Email
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required />
        </label>
        <label>
          Password <span style="font-weight:400;font-size:.75rem;">(min 8 characters)</span>
          <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password" required />
        </label>
        <p class="auth-error" id="reg-error"></p>
        <button type="submit" class="btn-submit" id="reg-submit">Create Account</button>
      </form>
    </div>
  </div>

  <script>

       DATA LAYER — hardcoded courts & time slots

          { id: "c4-s1", time: "06:00 – 07:00", period: "Morning"   },
          { id: "c4-s2", time: "08:00 – 09:00", period: "Morning"   },
          { id: "c4-s3", time: "10:00 – 11:00", period: "Morning"   },
          { id: "c4-s4", time: "13:00 – 14:00", period: "Afternoon" },
          { id: "c4-s5", time: "14:00 – 15:00", period: "Afternoon" },
          { id: "c4-s6", time: "17:00 – 18:00", period: "Evening"   },
          { id: "c4-s7", time: "18:00 – 19:00", period: "Evening"   },
          { id: "c4-s8", time: "20:00 – 21:00", period: "Evening"   },
        ],
      },
    ];

    /* ────────────────────────────────────────────────────────────
       DATE HELPERS
    ──────────────────────────────────────────────────────────── */
    function dateToKey(d) {
      const y   = d.getFullYear();
      const m   = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function buildDays() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return Array.from({ length: 8 }, (_, i) => {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        return {
          key:     dateToKey(d),
          dayName: d.toLocaleDateString("en-GB", { weekday: "short" }),
          dayNum:  d.getDate(),
          month:   d.toLocaleDateString("en-GB", { month: "short" }),
          isToday: i === 0,
          full:    d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" }),
        };
      });
    }

    const DAYS = buildDays();

    /* ────────────────────────────────────────────────────────────
       STATE
    ──────────────────────────────────────────────────────────── */
    let currentUser   = null;       // { id, name, email } | null
    let dateBookings  = [];         // booking rows from API for selectedDate
    let selectedDate  = DAYS[0].key;
    let activeCourtId = null;
    let bannerTimer   = null;
    let authIntent    = null;       // { courtId, slotId } queued before login

    /* ────────────────────────────────────────────────────────────
       API HELPERS
    ──────────────────────────────────────────────────────────── */
    async function apiFetch(url, options = {}) {
      const res  = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        ...options,
      });
      const data = await res.json();
      if (!res.ok) {
        const err = new Error(data.error || "Request failed");
        err.status = res.status;
        throw err;
      }
      return data;
    }

    async function loadSession() {
      const data = await apiFetch("/api/auth/me");
      currentUser = data.user;
    }

    async function loadBookings(date) {
      const data = await apiFetch(`/api/bookings?date=${date}`);
      dateBookings = data.bookings;
    }

    /* ────────────────────────────────────────────────────────────
       SLOT STATUS
    ──────────────────────────────────────────────────────────── */
    function getSlotStatus(courtId, slotId) {
      const b = dateBookings.find(b => b.court_id === courtId && b.slot_id === slotId);
      if (!b) return { status: "available" };
      if (currentUser && b.user_id === currentUser.id)
        return { status: "mine", bookingId: b.id };
      return { status: "taken", userName: b.user_name };
    }

    /* ────────────────────────────────────────────────────────────
       HELPERS
    ──────────────────────────────────────────────────────────── */
    const $ = (id) => document.getElementById(id);

    function groupSlotsByPeriod(slots) {
      const ORDER = ["Morning", "Afternoon", "Evening"];
      return ORDER.reduce((acc, period) => {
        const group = slots.filter(s => s.period === period);
        if (group.length) acc[period] = group;
        return acc;
      }, {});
    }

    function selectedDayObj() {
      return DAYS.find(d => d.key === selectedDate) ?? DAYS[0];
    }

    /* ────────────────────────────────────────────────────────────
       RENDER — User Area
    ──────────────────────────────────────────────────────────── */
    function renderUserArea() {
      const el = $("user-area");
      if (currentUser) {
        el.innerHTML = `
          <span id="user-greeting">Hello, <strong>${currentUser.name}</strong></span>
          <button class="btn-auth btn-auth--ghost" data-action="logout">Sign Out</button>`;
      } else {
        el.innerHTML = `
          <button class="btn-auth btn-auth--ghost" data-action="open-auth" data-tab="login">Sign In</button>
          <button class="btn-auth btn-auth--primary" data-action="open-auth" data-tab="register">Register</button>`;
      }
    }

    /* ────────────────────────────────────────────────────────────
       RENDER — Date Strip
    ──────────────────────────────────────────────────────────── */
    function renderDateStrip() {
      const html = DAYS.map(d => {
        const isSelected = d.key === selectedDate;
        const classes = [
          "date-btn",
          d.isToday  ? "date-btn--today"    : "",
          isSelected ? "date-btn--selected" : "",
        ].filter(Boolean).join(" ");

        return `
          <button
            class="${classes}"
            data-action="select-date"
            data-date="${d.key}"
            aria-pressed="${isSelected}"
            aria-label="${d.full}${d.isToday ? " (Today)" : ""}"
          >
            <span class="date-btn__day">${d.dayName}</span>
            <span class="date-btn__num">${d.dayNum}</span>
            <span class="date-btn__month">${d.month}</span>
          </button>`;
      }).join("");

      $("date-strip").innerHTML = html;
    }

    /* ────────────────────────────────────────────────────────────
       RENDER — Courts Grid
    ──────────────────────────────────────────────────────────── */
    function renderCourts() {
      const day = selectedDayObj();
      $("section-date-badge").textContent =
        day.isToday ? `Today · ${day.dayNum} ${day.month}` : `${day.dayName} · ${day.dayNum} ${day.month}`;

      const html = COURTS.map(court => {
        const totalSlots  = court.slots.length;
        const myBookings  = court.slots.filter(s => {
          const st = getSlotStatus(court.id, s.id);
          return st.status === "mine";
        }).length;
        const takenSlots  = court.slots.filter(s => {
          const st = getSlotStatus(court.id, s.id);
          return st.status === "taken" || st.status === "mine";
        }).length;
        const freeCount   = totalSlots - takenSlots;

        return `
          <article class="court-card">
            <div class="card-header">
              <span class="card-emoji">${court.emoji}</span>
              <div class="card-title">
                <h2>${court.name}</h2>
                <p class="card-location">${court.location}</p>
              </div>
            </div>
            <div class="card-stats">
              <span class="stat-pill available">${freeCount} available</span>
              ${myBookings > 0 ? `<span class="stat-pill booked">${myBookings} booked by you</span>` : ""}
            </div>
            <button
              class="btn-view"
              data-action="open-modal"
              data-court="${court.id}"
              aria-label="View slots for ${court.name}"
            >View Slots →</button>
          </article>`;
      }).join("");

      $("courts-grid").innerHTML = html;
    }

    /* ────────────────────────────────────────────────────────────
       RENDER — Booking Modal
    ──────────────────────────────────────────────────────────── */
    function renderModal(courtId) {
      const court = COURTS.find(c => c.id === courtId);
      if (!court) return;

      const day = selectedDayObj();
      $("modal-court-name").textContent = court.name;
      $("modal-court-loc").textContent  = court.location;
      $("modal-date-line").textContent  =
        `📅 ${day.full}${day.isToday ? " (Today)" : ""}`;

      const grouped    = groupSlotsByPeriod(court.slots);
      const signInNote = !currentUser
        ? `<p class="modal-sign-in-note">
            🔒 <span><button data-action="open-auth" data-tab="login">Sign in</button> to book a slot</span>
           </p>`
        : "";

      const periodsHtml = Object.entries(grouped).map(([period, slots]) => {
        const slotsHtml = slots.map(slot => {
          const st = getSlotStatus(court.id, slot.id);

          if (st.status === "mine") {
            return `
              <button
                class="slot-btn slot-btn--mine"
                data-action="cancel-slot"
                data-booking-id="${st.bookingId}"
                data-court="${court.id}"
                aria-pressed="true"
                title="Click to cancel your booking"
              >${slot.time}<span class="slot-badge">✓ Yours</span></button>`;
          }

          if (st.status === "taken") {
            return `
              <button class="slot-btn slot-btn--taken" disabled aria-disabled="true"
                title="Booked by ${st.userName}"
              >${slot.time} · Taken</button>`;
          }

          // available
          const action = currentUser ? "book-slot" : "open-auth";
          const extra  = currentUser
            ? `data-slot="${slot.id}" data-court="${court.id}" data-time="${slot.time}"`
            : `data-tab="login" data-intent-court="${court.id}" data-intent-slot="${slot.id}"`;
          return `
            <button
              class="slot-btn"
              data-action="${action}"
              ${extra}
              aria-pressed="false"
              title="${currentUser ? "Click to book" : "Sign in to book"}"
            >${slot.time}</button>`;
        }).join("");

        return `
          <div class="period-group">
            <p class="period-label">${period}</p>
            <div class="slots-row">${slotsHtml}</div>
          </div>`;
      }).join("");

      $("modal-body").innerHTML = signInNote + periodsHtml + `
        <p class="modal-hint">
          ${currentUser
            ? "Tap a slot to book · Tap <em>Yours</em> (hover shows red) to cancel"
            : "Sign in to make a booking"}
        </p>`;

      $("modal-overlay").classList.add("open");
      activeCourtId = courtId;

      const firstBtn = $("modal-overlay").querySelector("button");
      if (firstBtn) firstBtn.focus();
    }

    function closeModal() {
      $("modal-overlay").classList.remove("open");
      activeCourtId = null;
      renderCourts();
    }

    /* ────────────────────────────────────────────────────────────
       RENDER — Confirmation Banner
    ──────────────────────────────────────────────────────────── */
    function showBanner(message) {
      clearTimeout(bannerTimer);
      $("banner-msg").textContent = message;
      $("banner").classList.add("visible");
      bannerTimer = setTimeout(() => $("banner").classList.remove("visible"), 3500);
    }

    function hideBanner() {
      clearTimeout(bannerTimer);
      $("banner").classList.remove("visible");
    }

    /* ────────────────────────────────────────────────────────────
       AUTH MODAL
    ──────────────────────────────────────────────────────────── */
    function openAuth(tab = "login") {
      switchAuthTab(tab);
      $("auth-overlay").classList.add("open");
      const firstInput = $("auth-modal").querySelector("input");
      if (firstInput) setTimeout(() => firstInput.focus(), 50);
    }

    function closeAuth() {
      $("auth-overlay").classList.remove("open");
      authIntent = null;
    }

    function switchAuthTab(tab) {
      document.querySelectorAll(".auth-tab").forEach(t =>
        t.classList.toggle("active", t.dataset.tab === tab)
      );
      document.querySelectorAll(".auth-form").forEach(f =>
        f.classList.toggle("active", f.id === `${tab}-form`)
      );
      clearAuthErrors();
    }

    function clearAuthErrors() {
      document.querySelectorAll(".auth-error").forEach(el => {
        el.textContent = "";
        el.classList.remove("visible");
      });
    }

    function showAuthError(id, msg) {
      const el = $(id);
      el.textContent = msg;
      el.classList.add("visible");
    }

    function setSubmitLoading(btnId, loading) {
      const btn = $(btnId);
      btn.disabled  = loading;
      btn.textContent = loading ? "Please wait…" : (btnId === "login-submit" ? "Sign In" : "Create Account");
    }

    /* ────────────────────────────────────────────────────────────
       AUTH FORM SUBMISSIONS
    ──────────────────────────────────────────────────────────── */
    $("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearAuthErrors();
      const email    = $("login-email").value.trim();
      const password = $("login-password").value;

      setSubmitLoading("login-submit", true);
      try {
        const data  = await apiFetch("/api/auth/login", {
          method: "POST",
          body:   JSON.stringify({ email, password }),
        });
        currentUser = data.user;
        closeAuth();
        renderUserArea();
        await loadBookings(selectedDate);
        renderCourts();
        if (activeCourtId) renderModal(activeCourtId);
        // Execute pending booking if user clicked a slot before logging in
        if (authIntent) {
          const { courtId, slotId, time } = authIntent;
          authIntent = null;
          await doBookSlot(courtId, slotId, time);
        }
        showBanner(`Welcome back, ${data.user.name}!`);
      } catch (err) {
        showAuthError("login-error", err.message);
      } finally {
        setSubmitLoading("login-submit", false);
      }
    });

    $("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearAuthErrors();
      const name     = $("reg-name").value.trim();
      const email    = $("reg-email").value.trim();
      const password = $("reg-password").value;

      setSubmitLoading("reg-submit", true);
      try {
        const data  = await apiFetch("/api/auth/register", {
          method: "POST",
          body:   JSON.stringify({ name, email, password }),
        });
        currentUser = data.user;
        closeAuth();
        renderUserArea();
        await loadBookings(selectedDate);
        renderCourts();
        if (activeCourtId) renderModal(activeCourtId);
        showBanner(`Account created! Welcome, ${data.user.name} 🎉`);
      } catch (err) {
        showAuthError("reg-error", err.message);
      } finally {
        setSubmitLoading("reg-submit", false);
      }
    });

    /* ────────────────────────────────────────────────────────────
       BOOKING ACTIONS
    ──────────────────────────────────────────────────────────── */
    async function doBookSlot(courtId, slotId, time) {
      const court = COURTS.find(c => c.id === courtId);
      if (!court) return;
      try {
        await apiFetch("/api/bookings", {
          method: "POST",
          body:   JSON.stringify({
            courtId,
            courtName: court.name,
            slotId,
            slotTime:  time,
            date:      selectedDate,
          }),
        });
        await loadBookings(selectedDate);
        renderCourts();
        if (activeCourtId === courtId) renderModal(courtId);
        const day       = selectedDayObj();
        const dateLabel = day.isToday ? "Today" : `${day.dayName} ${day.dayNum} ${day.month}`;
        showBanner(`Booked: ${court.name} · ${time} · ${dateLabel}`);
      } catch (err) {
        if (err.status === 409) {
          // Someone else just booked it — refresh and show updated state
          await loadBookings(selectedDate);
          renderCourts();
          if (activeCourtId === courtId) renderModal(courtId);
          showBanner("Sorry, that slot was just taken by someone else.");
        } else {
          showBanner(`Booking failed: ${err.message}`);
        }
      }
    }

    async function doCancelSlot(bookingId, courtId) {
      try {
        await apiFetch(`/api/bookings/${bookingId}`, { method: "DELETE" });
        await loadBookings(selectedDate);
        renderCourts();
        if (activeCourtId === courtId) renderModal(courtId);
      } catch (err) {
        showBanner(`Cancel failed: ${err.message}`);
      }
    }

    /* ────────────────────────────────────────────────────────────
       EVENT DELEGATION — single listener on body
    ──────────────────────────────────────────────────────────── */
    document.body.addEventListener("click", async (e) => {
      const el = e.target.closest("[data-action]");
      if (!el) return;

      const action = el.dataset.action;

      if (action === "select-date") {
        selectedDate = el.dataset.date;
        renderDateStrip();
        await loadBookings(selectedDate);
        renderCourts();
        if (activeCourtId) renderModal(activeCourtId);
        return;
      }

      if (action === "open-modal") {
        renderModal(el.dataset.court);
        return;
      }

      if (action === "close-modal") {
        closeModal();
        return;
      }

      if (action === "close-banner") {
        hideBanner();
        return;
      }

      if (action === "open-auth") {
        // If triggered from a slot button, remember the intent
        if (el.dataset.intentCourt) {
          authIntent = {
            courtId: el.dataset.intentCourt,
            slotId:  el.dataset.intentSlot,
            time:    el.textContent.trim(),
          };
        }
        openAuth(el.dataset.tab ?? "login");
        return;
      }

      if (action === "close-auth") {
        closeAuth();
        return;
      }

      if (action === "logout") {
        await apiFetch("/api/auth/logout", { method: "POST" });
        currentUser   = null;
        dateBookings  = await apiFetch(`/api/bookings?date=${selectedDate}`).then(d => d.bookings);
        renderUserArea();
        renderCourts();
        if (activeCourtId) renderModal(activeCourtId);
        return;
      }

      if (action === "book-slot") {
        await doBookSlot(el.dataset.court, el.dataset.slot, el.dataset.time);
        return;
      }

      if (action === "cancel-slot") {
        await doCancelSlot(el.dataset.bookingId, el.dataset.court);
        return;
      }
    });

    // Auth tab switching
    document.querySelectorAll(".auth-tab").forEach(btn => {
      btn.addEventListener("click", () => switchAuthTab(btn.dataset.tab));
    });

    // Close modals on backdrop click
    $("modal-overlay").addEventListener("click", (e) => {
      if (e.target === $("modal-overlay")) closeModal();
    });
    $("auth-overlay").addEventListener("click", (e) => {
      if (e.target === $("auth-overlay")) closeAuth();
    });

    /* ────────────────────────────────────────────────────────────
       KEYBOARD HANDLING
    ──────────────────────────────────────────────────────────── */
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if ($("auth-overlay").classList.contains("open")) { closeAuth(); return; }
        if (activeCourtId !== null) { closeModal(); return; }
      }

      if (e.key === "Tab") {
        const openModal = $("auth-overlay").classList.contains("open")
          ? $("auth-modal")
          : activeCourtId !== null ? $("modal") : null;

        if (!openModal) return;
        const focusable = [...openModal.querySelectorAll(
          'button:not([disabled]), input, [tabindex]:not([tabindex="-1"])'
        )];
        if (focusable.length < 2) return;

        const first = focusable[0];
        const last  = focusable[focusable.length - 1];
        if (e.shiftKey) {
          if (document.activeElement === first) { e.preventDefault(); last.focus(); }
        } else {
          if (document.activeElement === last)  { e.preventDefault(); first.focus(); }
        }
      }
    });

    /* ────────────────────────────────────────────────────────────
       INIT
    ──────────────────────────────────────────────────────────── */
    async function init() {
      $("today-date").textContent = new Date().toLocaleDateString("en-GB", {
        weekday: "long", year: "numeric", month: "long", day: "numeric",
      });

      await Promise.all([loadSession(), loadBookings(selectedDate)]);

      renderUserArea();
      renderDateStrip();
      renderCourts();
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
